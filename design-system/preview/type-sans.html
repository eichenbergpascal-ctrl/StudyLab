<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: #FFFFFF;
    padding: 20px 24px;
    display: flex;
    
  }
  
    .specimen { display: flex; flex-direction: column; gap: 10px; font-family: var(--font-sans); }
    .weights { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; color: var(--slate-600); }
    .chars { font-size: 15px; letter-spacing: 0.02em; }
  
</style>
</head>
<body>
<div class="specimen">
  <div class="sample" style="font-weight: 700; font-size: 28px; letter-spacing: -0.025em; color: var(--slate-900);">Plus Jakarta Sans</div>
  <div class="weights">
    <span style="font-weight: 300">Light 300</span>
    <span style="font-weight: 400">Regular 400</span>
    <span style="font-weight: 500">Medium 500</span>
    <span style="font-weight: 600">Semibold 600</span>
    <span style="font-weight: 700">Bold 700</span>
    <span style="font-weight: 800">ExtraBold 800</span>
  </div>
  <div class="chars" style="color: var(--slate-500)">AaBbCcDdEeFfGg 0123456789 äöüß ?!@#&</div>
</div>
</body>
</html>
