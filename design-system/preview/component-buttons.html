<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: #FFFFFF;
    padding: 20px 24px;
    display: flex;
    
  }
  
    .groups { display: flex; flex-direction: column; gap: 14px; }
    .group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn {
      font-family: var(--font-sans); font-size: 14px; font-weight: 500;
      padding: 8px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
      transition: all 150ms var(--ease-default);
    }
    .btn.sm { font-size: 13px; padding: 5px 12px; }
    .btn.lg { font-size: 15px; padding: 10px 20px; }
    .btn.icon-btn { padding: 8px; }
    .btn.primary { background: var(--blue-500); color: #fff; }
    .btn.primary:hover { background: var(--blue-600); }
    .btn.secondary { background: var(--slate-100); color: var(--slate-700); border: 1px solid var(--slate-200); }
    .btn.ghost { background: transparent; color: var(--slate-600); }
    .btn.ghost:hover { background: var(--slate-100); }
    .btn.destructive { background: var(--red-500); color: #fff; }
    .btn.destructive:hover { background: var(--red-600); }
  
</style>
</head>
<body>
<div class="groups">
  <div class="group">
    <button class="btn primary">Weiter</button>
    <button class="btn secondary">Abbrechen</button>
    <button class="btn ghost">Überspringen</button>
    <button class="btn destructive">Löschen</button>
  </div>
  <div class="group">
    <button class="btn primary sm">Klein</button>
    <button class="btn primary">Normal</button>
    <button class="btn primary lg">Groß</button>
    <button class="btn primary icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  </div>
</div>
</body>
</html>
