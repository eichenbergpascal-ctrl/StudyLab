<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: #FFFFFF;
    padding: 16px;
    display: flex;
    align-items: stretch;
  }
  
    .row { display: flex; gap: 4px; width: 100%; height: 100%; align-items: stretch; }
    .swatch { flex: 1; border-radius: 6px; display: flex; align-items: flex-end; padding: 6px; min-height: 80px; }
    .label { font-size: 11px; font-weight: 600; font-family: var(--font-mono); }
  
</style>
</head>
<body>
<div class="row">
  
    <div class="swatch" style="background: var(--slate-50)">
      <span class="label" style="color: #1E242E">50</span>
    </div>
    <div class="swatch" style="background: var(--slate-100)">
      <span class="label" style="color: #1E242E">100</span>
    </div>
    <div class="swatch" style="background: var(--slate-200)">
      <span class="label" style="color: #1E242E">200</span>
    </div>
    <div class="swatch" style="background: var(--slate-300)">
      <span class="label" style="color: #1E242E">300</span>
    </div>
    <div class="swatch" style="background: var(--slate-400)">
      <span class="label" style="color: #1E242E">400</span>
    </div>
    <div class="swatch" style="background: var(--slate-500)">
      <span class="label" style="color: #fff">500</span>
    </div>
    <div class="swatch" style="background: var(--slate-600)">
      <span class="label" style="color: #fff">600</span>
    </div>
    <div class="swatch" style="background: var(--slate-700)">
      <span class="label" style="color: #fff">700</span>
    </div>
    <div class="swatch" style="background: var(--slate-800)">
      <span class="label" style="color: #fff">800</span>
    </div>
    <div class="swatch" style="background: var(--slate-900)">
      <span class="label" style="color: #fff">900</span>
    </div>
    <div class="swatch" style="background: var(--slate-950)">
      <span class="label" style="color: #fff">950</span>
    </div>
</div>
</body>
</html>
