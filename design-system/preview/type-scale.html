<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: #FFFFFF;
    padding: 16px 24px;
    display: flex;
    
  }
  
    .scale { display: flex; flex-direction: column; gap: 2px; font-family: var(--font-sans); }
    .row { display: flex; align-items: baseline; gap: 16px; padding: 3px 0; }
    .label { font-family: var(--font-mono); font-size: 10px; color: var(--slate-400); width: 80px; flex-shrink: 0; text-align: right; }
    .sample { color: var(--slate-900); white-space: nowrap; }
  
</style>
</head>
<body>
<div class="scale">
  <div class="row"><span class="label">5xl · 48px</span><span class="sample" style="font-size: 36px; font-weight: 700; letter-spacing: -0.025em;">Klausurvorbereitung</span></div>
  <div class="row"><span class="label">4xl · 36px</span><span class="sample" style="font-size: 28px; font-weight: 700; letter-spacing: -0.025em;">Karteikarten</span></div>
  <div class="row"><span class="label">3xl · 30px</span><span class="sample" style="font-size: 24px; font-weight: 600;">Probeklausur</span></div>
  <div class="row"><span class="label">2xl · 24px</span><span class="sample" style="font-size: 20px; font-weight: 600;">Zusammenfassung</span></div>
  <div class="row"><span class="label">xl · 20px</span><span class="sample" style="font-size: 17px; font-weight: 600;">Fehler-Tracking</span></div>
  <div class="row"><span class="label">base · 16px</span><span class="sample" style="font-size: 14px;">Dashboard mit Übersicht</span></div>
  <div class="row"><span class="label">sm · 14px</span><span class="sample" style="font-size: 12.5px; color: var(--slate-600);">Letzte Aktivität</span></div>
  <div class="row"><span class="label">xs · 12px</span><span class="sample" style="font-size: 11px; color: var(--slate-500); font-weight: 500;">FORTSCHRITT · 42%</span></div>
</div>
</body>
</html>
