<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: #FFFFFF;
    padding: 20px 24px;
    display: flex;
    
  }
  
    .specimen { display: flex; flex-direction: column; gap: 8px; }
    .sample { font-family: var(--font-serif); font-size: 26px; font-weight: 600; color: var(--slate-900); }
    .reading { font-family: var(--font-serif); font-size: 16px; line-height: 1.7; color: var(--slate-700); max-width: 600px; }
    .meta { font-family: var(--font-sans); font-size: 11px; color: var(--slate-400); font-weight: 500; }
  
</style>
</head>
<body>
<div class="specimen">
  <div class="sample">Source Serif 4</div>
  <div class="reading">Vorlesungszusammenfassungen können lang und komplex sein. Diese Serifenschrift sorgt für eine angenehme Leseerfahrung, auch bei längeren Texten. <em>Kursiv für Betonungen.</em></div>
  <div class="meta">Optimized for long-form reading — Summary Viewer, notes, study materials</div>
</div>
</body>
</html>
