<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: #FFFFFF;
    padding: 20px 24px;
    display: flex;
    
  }
  
    .inputs { display: flex; gap: 12px; align-items: flex-end; width: 100%; }
    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    label { font-size: 13px; font-weight: 500; color: var(--slate-600); font-family: var(--font-sans); }
    input, select {
      font-family: var(--font-sans); font-size: 14px; padding: 8px 12px;
      border: 1px solid var(--slate-200); border-radius: var(--radius-sm);
      background: #fff; color: var(--slate-900); outline: none; width: 100%;
    }
    input:focus { border-color: var(--blue-400); box-shadow: 0 0 0 3px rgba(81,120,192,0.12); }
    .select-wrap { position: relative; }
    .select-wrap select { appearance: none; padding-right: 28px; }
    .chevron { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--slate-400); pointer-events: none; }
    .row { display: flex; gap: 16px; align-items: center; align-self: center; }
    .toggle-wrap, .check-wrap { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--slate-700); font-family: var(--font-sans); }
    .toggle { width: 36px; height: 20px; border-radius: 999px; background: var(--slate-300); position: relative; cursor: pointer; transition: background 150ms; }
    .toggle.on { background: var(--blue-500); }
    .thumb { width: 16px; height: 16px; border-radius: 50%; background: #fff; position: absolute; top: 2px; left: 2px; transition: transform 150ms; box-shadow: var(--shadow-xs); }
    .toggle.on .thumb { transform: translateX(16px); }
    .checkbox { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--slate-300); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .checkbox.checked { background: var(--blue-500); border-color: var(--blue-500); }
  
</style>
</head>
<body>
<div class="inputs">
  <div class="field">
    <label>Klausurname</label>
    <input type="text" placeholder="z.B. Lineare Algebra II" value="Einführung in die Informatik">
  </div>
  <div class="field">
    <label>Fach</label>
    <div class="select-wrap">
      <select><option>Informatik</option></select>
      <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>
  </div>
  <div class="row">
    <div class="toggle-wrap"><div class="toggle on"><div class="thumb"></div></div><span>Erinnerungen</span></div>
    <div class="check-wrap"><div class="checkbox checked"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M5 12l5 5L20 7"/></svg></div><span>Wiederholen</span></div>
  </div>
</div>
</body>
</html>
