<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: #FFFFFF;
    padding: 16px 24px;
    display: flex;
    align-items: center; justify-content: center;
  }
  
    .radii { display: flex; gap: 16px; align-items: flex-end; height: 100%; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .box { width: 52px; height: 52px; background: var(--blue-100); border: 2px solid var(--blue-400); }
    .name { font-size: 12px; font-weight: 600; color: var(--slate-700); font-family: var(--font-sans); }
    .val { font-size: 10px; color: var(--slate-400); font-family: var(--font-mono); }
  
</style>
</head>
<body>
<div class="radii">
  
    <div class="item">
      <div class="box" style="border-radius: var(--radius-xs)"></div>
      <span class="name">xs</span>
      <span class="val">4px</span>
    </div>
    <div class="item">
      <div class="box" style="border-radius: var(--radius-sm)"></div>
      <span class="name">sm</span>
      <span class="val">6px</span>
    </div>
    <div class="item">
      <div class="box" style="border-radius: var(--radius-md)"></div>
      <span class="name">md</span>
      <span class="val">8px</span>
    </div>
    <div class="item">
      <div class="box" style="border-radius: var(--radius-lg)"></div>
      <span class="name">lg</span>
      <span class="val">12px</span>
    </div>
    <div class="item">
      <div class="box" style="border-radius: var(--radius-xl)"></div>
      <span class="name">xl</span>
      <span class="val">16px</span>
    </div>
    <div class="item">
      <div class="box" style="border-radius: var(--radius-2xl)"></div>
      <span class="name">2xl</span>
      <span class="val">20px</span>
    </div>
    <div class="item">
      <div class="box" style="border-radius: var(--radius-full)"></div>
      <span class="name">full</span>
      <span class="val">9999px</span>
    </div>
</div>
</body>
</html>
