<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: var(--slate-50);
    padding: 20px 24px;
    display: flex;
    align-items: center; justify-content: center;
  }
  
    .shadows { display: flex; gap: 24px; align-items: center; justify-content: center; width: 100%; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .box { width: 64px; height: 48px; background: #fff; border-radius: 8px; }
    .name { font-size: 12px; font-weight: 600; color: var(--slate-600); font-family: var(--font-sans); }
  
</style>
</head>
<body>
<div class="shadows">
  
    <div class="item">
      <div class="box" style="box-shadow: var(--shadow-xs)"></div>
      <span class="name">xs</span>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: var(--shadow-sm)"></div>
      <span class="name">sm</span>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: var(--shadow-md)"></div>
      <span class="name">md</span>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: var(--shadow-lg)"></div>
      <span class="name">lg</span>
    </div>
    <div class="item">
      <div class="box" style="box-shadow: var(--shadow-xl)"></div>
      <span class="name">xl</span>
    </div>
</div>
</body>
</html>
