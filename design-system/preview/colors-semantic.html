<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: #FFFFFF;
    padding: 20px 24px;
    display: flex;
    
  }
  
    .grid { display: flex; gap: 20px; width: 100%; align-items: center; }
    .group { flex: 1; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
    .chip { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
    .row { display: flex; gap: 3px; }
    .dot { width: 18px; height: 18px; border-radius: 4px; }
  
</style>
</head>
<body>
<div class="grid">
  <div class="group">
    <div class="chip" style="background: var(--green-500); color: #fff">Success</div>
    <div class="row">
      <div class="dot" style="background: var(--green-50)"></div><div class="dot" style="background: var(--green-100)"></div><div class="dot" style="background: var(--green-200)"></div><div class="dot" style="background: var(--green-300)"></div><div class="dot" style="background: var(--green-400)"></div><div class="dot" style="background: var(--green-500)"></div><div class="dot" style="background: var(--green-600)"></div><div class="dot" style="background: var(--green-700)"></div>
    </div>
  </div>
  <div class="group">
    <div class="chip" style="background: var(--amber-500); color: #fff">Warning</div>
    <div class="row">
      <div class="dot" style="background: var(--amber-50)"></div><div class="dot" style="background: var(--amber-100)"></div><div class="dot" style="background: var(--amber-200)"></div><div class="dot" style="background: var(--amber-300)"></div><div class="dot" style="background: var(--amber-400)"></div><div class="dot" style="background: var(--amber-500)"></div><div class="dot" style="background: var(--amber-600)"></div><div class="dot" style="background: var(--amber-700)"></div>
    </div>
  </div>
  <div class="group">
    <div class="chip" style="background: var(--red-500); color: #fff">Error</div>
    <div class="row">
      <div class="dot" style="background: var(--red-50)"></div><div class="dot" style="background: var(--red-100)"></div><div class="dot" style="background: var(--red-200)"></div><div class="dot" style="background: var(--red-300)"></div><div class="dot" style="background: var(--red-400)"></div><div class="dot" style="background: var(--red-500)"></div><div class="dot" style="background: var(--red-600)"></div><div class="dot" style="background: var(--red-700)"></div>
    </div>
  </div>
  <div class="group">
    <div class="chip" style="background: var(--blue-500); color: #fff">Info</div>
    <div class="row">
      <div class="dot" style="background: var(--blue-50)"></div><div class="dot" style="background: var(--blue-100)"></div><div class="dot" style="background: var(--blue-200)"></div><div class="dot" style="background: var(--blue-300)"></div><div class="dot" style="background: var(--blue-400)"></div><div class="dot" style="background: var(--blue-500)"></div><div class="dot" style="background: var(--blue-600)"></div><div class="dot" style="background: var(--blue-700)"></div>
    </div>
  </div>
</div>
</body>
</html>
