<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: #FFFFFF;
    padding: 20px 24px;
    display: flex;
    align-items: center;
  }
  
    .brand { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .logo-row { display: flex; align-items: center; gap: 20px; }
    .logo-full { height: 32px; }
    .logo-icon { height: 32px; }
    .divider { width: 1px; height: 32px; background: var(--slate-200); }
    .logo-dark { background: var(--slate-900); padding: 12px 20px; border-radius: 8px; display: flex; align-items: center; }
    .logo-dark .logo-full { height: 28px; }
  
</style>
</head>
<body>
<div class="brand">
  <div class="logo-row">
    <img src="../assets/logo.svg" alt="StudyLab" class="logo-full">
    <div class="divider"></div>
    <img src="../assets/logo-icon.svg" alt="Icon" class="logo-icon">
    <div class="divider"></div>
    <div class="logo-dark">
      <img src="../assets/logo-white.svg" alt="StudyLab" class="logo-full">
    </div>
  </div>
</div>
</body>
</html>
